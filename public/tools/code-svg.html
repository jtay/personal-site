<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS → SVG Renderer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #c084fc;
    --text: #e2e2f0;
    --muted: #6b6b88;
    --success: #34d399;
    --warn: #f59e0b;

    /* Default syntax palette */
    --tok-bg: #0d1117;
    --tok-fg: #e6edf3;
    --tok-keyword: #ff7b72;
    --tok-type: #79c0ff;
    --tok-string: #a5d6ff;
    --tok-number: #f2cc60;
    --tok-comment: #8b949e;
    --tok-function: #d2a8ff;
    --tok-operator: #ff7b72;
    --tok-punctuation: #c9d1d9;
    --tok-decorator: #ffa657;
    --tok-variable: #ffa657;
    --tok-interface: #79c0ff;
    --tok-generic: #56d364;
    --tok-linenum: #3d444d;
    --tok-selection: #264f78;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 360px 1fr;
    grid-template-areas: "header header" "sidebar main";
  }

  /* ── HEADER ── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 2px 7px;
    border-radius: 99px;
    text-transform: uppercase;
  }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ── SIDEBAR ── */
  aside {
    grid-area: sidebar;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Font upload */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--accent); background: rgba(124,106,247,.05); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 20px; margin-bottom: 4px; }
  .upload-zone p { font-size: 12px; color: var(--muted); }
  .upload-zone p strong { color: var(--text); }
  #font-status { font-size: 11px; color: var(--success); margin-top: 8px; display: none; }

  /* Font size / padding */
  label.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  label.row span { color: var(--text); font-weight: 500; min-width: 28px; text-align: right; }
  input[type=range] {
    -webkit-appearance: none;
    height: 3px;
    border-radius: 99px;
    background: var(--border);
    flex: 1;
    margin: 0 10px;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .toggle {
    position: relative;
    width: 34px; height: 18px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 99px;
    transition: background .2s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: left .2s;
  }
  .toggle input:checked ~ .toggle-thumb { left: 19px; }

  /* Palette */
  .palette-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .swatch {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .swatch:hover { border-color: var(--accent); }
  .swatch-dot {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,.12);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .swatch-dot input[type=color] {
    position: absolute;
    inset: -4px;
    opacity: 0;
    cursor: pointer;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
  }
  .swatch-label { font-size: 10px; color: var(--muted); line-height: 1.2; }

  /* Preset buttons */
  .presets { display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btn {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Code input */
  textarea#code-input {
    width: 100%;
    height: 220px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
    tab-size: 2;
  }
  textarea#code-input:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    letter-spacing: .02em;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6b59e8; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: #0f3d2c; color: var(--success); border: 1px solid #1a5c40; }
  .btn-success:hover { background: #1a5c40; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  /* ── MAIN ── */
  main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .toolbar-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  select.styled {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  #resolution-display {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .preview-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px;
    background:
      radial-gradient(ellipse 60% 40% at 70% 30%, rgba(124,106,247,.06) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,.015) 24px, rgba(255,255,255,.015) 25px),
      repeating-linear-gradient(90deg, transparent, transparent 24px, rgba(255,255,255,.015) 24px, rgba(255,255,255,.015) 25px);
  }

  #svg-preview {
    border-radius: 12px;
    box-shadow: 0 40px 120px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
    max-width: 100%;
    display: block;
  }

  #svg-preview.transparent-bg {
    box-shadow: 0 0 0 1px rgba(255,255,255,.1);
    background-image:
      linear-gradient(45deg, #2a2a38 25%, transparent 25%),
      linear-gradient(-45deg, #2a2a38 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #2a2a38 75%),
      linear-gradient(-45deg, transparent 75%, #2a2a38 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    background-color: #1a1a24;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 100%;
    color: var(--muted);
    font-size: 13px;
    width: 100%;
  }
  .empty-state .big { font-size: 48px; }

  /* Notification */
  #notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
  }
  #notif.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1><span>TS</span> → SVG Renderer</h1>
  <div class="badge">TypeScript</div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="copyAsSVG()">⎘ Copy SVG</button>
    <button class="btn btn-primary" id="render-btn" onclick="renderCode()">▶ Render</button>
  </div>
</header>

<!-- SIDEBAR -->
<aside>

  <!-- Code input -->
  <div class="section">
    <div class="section-title">TypeScript Code</div>
    <textarea id="code-input" spellcheck="false" placeholder="// Paste your TypeScript here…
interface User {
  id: number;
  name: string;
}

const greet = (user: User): string => {
  return \`Hello, \${user.name}!\`;
};">// Example TypeScript
interface Config {
  host: string;
  port: number;
  debug?: boolean;
}

type Handler&lt;T&gt; = (event: T) => Promise&lt;void&gt;;

class ApiClient {
  private readonly baseUrl: string;
  private headers: Record&lt;string, string&gt;;

  constructor(private config: Config) {
    this.baseUrl = `http://${config.host}:${config.port}`;
    this.headers = { 'Content-Type': 'application/json' };
  }

  async get&lt;T&gt;(path: string): Promise&lt;T&gt; {
    const res = await fetch(`${this.baseUrl}${path}`, {
      method: 'GET',
      headers: this.headers,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json() as Promise&lt;T&gt;;
  }
}

// Usage
const client = new ApiClient({ host: 'localhost', port: 3000 });
const data = await client.get&lt;User[]&gt;('/users');</textarea>
    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1" onclick="renderCode()">▶ Render Preview</button>
    </div>
  </div>

  <!-- Font -->
  <div class="section">
    <div class="section-title">Custom Font (TTF)</div>
    <div class="upload-zone">
      <input type="file" id="font-input" accept=".ttf,.otf,.woff,.woff2" onchange="loadFont(this)">
      <div class="icon">⌥</div>
      <p><strong>Drop TTF / OTF / WOFF</strong><br>or click to browse</p>
    </div>
    <div id="font-status">✓ Font loaded</div>
  </div>

  <!-- Display options -->
  <div class="section">
    <div class="section-title">Display</div>

    <label class="row">
      Font size
      <input type="range" min="10" max="28" value="14" id="font-size-slider" oninput="this.nextElementSibling.textContent=this.value+'px';scheduleRender()">
      <span>14px</span>
    </label>
    <label class="row">
      Line height
      <input type="range" min="12" max="40" value="22" id="line-height-slider" oninput="this.nextElementSibling.textContent=this.value+'px';scheduleRender()">
      <span>22px</span>
    </label>
    <label class="row">
      H padding
      <input type="range" min="8" max="80" value="32" id="pad-h-slider" oninput="this.nextElementSibling.textContent=this.value+'px';scheduleRender()">
      <span>32px</span>
    </label>
    <label class="row">
      V padding
      <input type="range" min="8" max="80" value="28" id="pad-v-slider" oninput="this.nextElementSibling.textContent=this.value+'px';scheduleRender()">
      <span>28px</span>
    </label>
    <label class="row">
      Border radius
      <input type="range" min="0" max="24" value="10" id="radius-slider" oninput="this.nextElementSibling.textContent=this.value+'px';scheduleRender()">
      <span>10px</span>
    </label>

    <div class="toggle-row">
      Line numbers
      <label class="toggle">
        <input type="checkbox" id="show-lines" checked onchange="scheduleRender()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      Window chrome
      <label class="toggle">
        <input type="checkbox" id="show-chrome" checked onchange="scheduleRender()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      Shadow
      <label class="toggle">
        <input type="checkbox" id="show-shadow" checked onchange="scheduleRender()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      Transparent BG
      <label class="toggle">
        <input type="checkbox" id="transparent-bg" onchange="scheduleRender()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- Palette presets -->
  <div class="section">
    <div class="section-title">Theme Presets</div>
    <div class="presets" id="preset-btns">
      <button class="preset-btn active" onclick="applyPreset('github-dark',this)">GitHub Dark</button>
      <button class="preset-btn" onclick="applyPreset('one-dark',this)">One Dark</button>
      <button class="preset-btn" onclick="applyPreset('dracula',this)">Dracula</button>
      <button class="preset-btn" onclick="applyPreset('solarized',this)">Solarized</button>
      <button class="preset-btn" onclick="applyPreset('nord',this)">Nord</button>
      <button class="preset-btn" onclick="applyPreset('monokai',this)">Monokai</button>
      <button class="preset-btn" onclick="applyPreset('light',this)">Light</button>
    </div>
  </div>

  <!-- Palette editor -->
  <div class="section" style="flex:1">
    <div class="section-title">Colour Palette</div>
    <div class="palette-grid" id="palette-grid"></div>
  </div>

  <!-- Export -->
  <div class="section">
    <div class="section-title">Export</div>
    <label class="row">
      Scale (PNG)
      <input type="range" min="1" max="4" step="0.5" value="2" id="scale-slider" oninput="this.nextElementSibling.textContent=this.value+'×'">
      <span>2×</span>
    </label>
    <div class="btn-row">
      <button class="btn btn-secondary" style="flex:1" onclick="downloadSVG()">↓ SVG</button>
      <button class="btn btn-success" style="flex:1" onclick="downloadPNG()">↓ PNG</button>
    </div>
  </div>

</aside>

<!-- MAIN PREVIEW -->
<main>
  <div class="toolbar">
    <span class="toolbar-title toolbar-label">Preview</span>
    <div id="resolution-display">—</div>
  </div>
  <div class="preview-area" id="preview-area">
    <div class="empty-state" id="empty-state">
      <div class="big">✦</div>
      <p>Paste TypeScript and hit <strong>Render</strong></p>
    </div>
    <svg id="svg-preview" style="display:none"></svg>
  </div>
</main>

<div id="notif"></div>

<script>
// ════════════════════════════════════════════════
// PALETTE DEFINITIONS
// ════════════════════════════════════════════════
const PALETTE_KEYS = [
  { key: 'tok-bg',          label: 'Background' },
  { key: 'tok-fg',          label: 'Foreground' },
  { key: 'tok-keyword',     label: 'Keyword' },
  { key: 'tok-type',        label: 'Type' },
  { key: 'tok-string',      label: 'String' },
  { key: 'tok-number',      label: 'Number' },
  { key: 'tok-comment',     label: 'Comment' },
  { key: 'tok-function',    label: 'Function' },
  { key: 'tok-operator',    label: 'Operator' },
  { key: 'tok-punctuation', label: 'Punctuation' },
  { key: 'tok-decorator',   label: 'Decorator' },
  { key: 'tok-variable',    label: 'Variable' },
  { key: 'tok-interface',   label: 'Interface' },
  { key: 'tok-generic',     label: 'Generic' },
  { key: 'tok-linenum',     label: 'Line nums' },
];

const PRESETS = {
  'github-dark': {
    'tok-bg':'#0d1117','tok-fg':'#e6edf3','tok-keyword':'#ff7b72','tok-type':'#79c0ff',
    'tok-string':'#a5d6ff','tok-number':'#f2cc60','tok-comment':'#8b949e','tok-function':'#d2a8ff',
    'tok-operator':'#ff7b72','tok-punctuation':'#c9d1d9','tok-decorator':'#ffa657',
    'tok-variable':'#ffa657','tok-interface':'#79c0ff','tok-generic':'#56d364','tok-linenum':'#3d444d'
  },
  'one-dark': {
    'tok-bg':'#282c34','tok-fg':'#abb2bf','tok-keyword':'#c678dd','tok-type':'#e5c07b',
    'tok-string':'#98c379','tok-number':'#d19a66','tok-comment':'#5c6370','tok-function':'#61afef',
    'tok-operator':'#56b6c2','tok-punctuation':'#abb2bf','tok-decorator':'#e06c75',
    'tok-variable':'#e06c75','tok-interface':'#e5c07b','tok-generic':'#98c379','tok-linenum':'#4b5263'
  },
  'dracula': {
    'tok-bg':'#282a36','tok-fg':'#f8f8f2','tok-keyword':'#ff79c6','tok-type':'#8be9fd',
    'tok-string':'#f1fa8c','tok-number':'#bd93f9','tok-comment':'#6272a4','tok-function':'#50fa7b',
    'tok-operator':'#ff79c6','tok-punctuation':'#f8f8f2','tok-decorator':'#ffb86c',
    'tok-variable':'#ffb86c','tok-interface':'#8be9fd','tok-generic':'#50fa7b','tok-linenum':'#44475a'
  },
  'solarized': {
    'tok-bg':'#002b36','tok-fg':'#839496','tok-keyword':'#859900','tok-type':'#268bd2',
    'tok-string':'#2aa198','tok-number':'#d33682','tok-comment':'#586e75','tok-function':'#268bd2',
    'tok-operator':'#859900','tok-punctuation':'#93a1a1','tok-decorator':'#cb4b16',
    'tok-variable':'#b58900','tok-interface':'#268bd2','tok-generic':'#2aa198','tok-linenum':'#073642'
  },
  'nord': {
    'tok-bg':'#2e3440','tok-fg':'#d8dee9','tok-keyword':'#81a1c1','tok-type':'#8fbcbb',
    'tok-string':'#a3be8c','tok-number':'#b48ead','tok-comment':'#616e88','tok-function':'#88c0d0',
    'tok-operator':'#81a1c1','tok-punctuation':'#eceff4','tok-decorator':'#d08770',
    'tok-variable':'#d08770','tok-interface':'#8fbcbb','tok-generic':'#a3be8c','tok-linenum':'#3b4252'
  },
  'monokai': {
    'tok-bg':'#272822','tok-fg':'#f8f8f2','tok-keyword':'#f92672','tok-type':'#66d9e8',
    'tok-string':'#e6db74','tok-number':'#ae81ff','tok-comment':'#75715e','tok-function':'#a6e22e',
    'tok-operator':'#f92672','tok-punctuation':'#f8f8f2','tok-decorator':'#fd971f',
    'tok-variable':'#fd971f','tok-interface':'#66d9e8','tok-generic':'#a6e22e','tok-linenum':'#3d3d2c'
  },
  'light': {
    'tok-bg':'#fafafa','tok-fg':'#24292e','tok-keyword':'#d73a49','tok-type':'#005cc5',
    'tok-string':'#032f62','tok-number':'#e36209','tok-comment':'#6a737d','tok-function':'#6f42c1',
    'tok-operator':'#d73a49','tok-punctuation':'#24292e','tok-decorator':'#e36209',
    'tok-variable':'#e36209','tok-interface':'#005cc5','tok-generic':'#22863a','tok-linenum':'#d1d5da'
  }
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let currentPalette = { ...PRESETS['github-dark'] };
let customFontName = null;
let customFontData = null;
let renderTimer = null;
let lastSVG = null;

const LS_KEY = 'ts-renderer-v1';

function saveState() {
  const state = {
    palette: currentPalette,
    code: document.getElementById('code-input').value,
    fontSize: document.getElementById('font-size-slider').value,
    lineHeight: document.getElementById('line-height-slider').value,
    padH: document.getElementById('pad-h-slider').value,
    padV: document.getElementById('pad-v-slider').value,
    radius: document.getElementById('radius-slider').value,
    scale: document.getElementById('scale-slider').value,
    showLines: document.getElementById('show-lines').checked,
    showChrome: document.getElementById('show-chrome').checked,
    showShadow: document.getElementById('show-shadow').checked,
    transparentBg: document.getElementById('transparent-bg').checked,
    activePreset: (document.querySelector('.preset-btn.active') || {}).textContent || null,
    fontName: customFontName,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}

function setSlider(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = value;
  const span = el.nextElementSibling;
  if (span && span.tagName === 'SPAN') {
    span.textContent = value + (el.step === '0.5' ? '×' : 'px');
  }
}

function loadState() {
  let state;
  try { state = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e) {}
  if (!state) return;

  if (state.palette) currentPalette = state.palette;
  if (state.code !== undefined) document.getElementById('code-input').value = state.code;
  if (state.fontSize)   setSlider('font-size-slider', state.fontSize);
  if (state.lineHeight) setSlider('line-height-slider', state.lineHeight);
  if (state.padH)       setSlider('pad-h-slider', state.padH);
  if (state.padV)       setSlider('pad-v-slider', state.padV);
  if (state.radius)     setSlider('radius-slider', state.radius);
  if (state.scale)      setSlider('scale-slider', state.scale);
  if (state.showLines    !== undefined) document.getElementById('show-lines').checked      = state.showLines;
  if (state.showChrome   !== undefined) document.getElementById('show-chrome').checked     = state.showChrome;
  if (state.showShadow   !== undefined) document.getElementById('show-shadow').checked     = state.showShadow;
  if (state.transparentBg !== undefined) document.getElementById('transparent-bg').checked = state.transparentBg;
  if (state.fontName) {
    customFontName = state.fontName;
    document.getElementById('font-status').style.display = 'block';
    document.getElementById('font-status').textContent = '✓ ' + state.fontName + ' (re-upload to embed in SVG)';
  }
  if (state.activePreset) {
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === state.activePreset);
    });
  }
}

// ════════════════════════════════════════════════
// PALETTE UI
// ════════════════════════════════════════════════
function buildPaletteUI() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = '';
  PALETTE_KEYS.forEach(({ key, label }) => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.innerHTML = `
      <div class="swatch-dot" id="dot-${key}" style="background:${currentPalette[key]}">
        <input type="color" value="${currentPalette[key]}" data-key="${key}"
          oninput="updateColor(this.dataset.key,this.value)"
          onchange="updateColor(this.dataset.key,this.value)">
      </div>
      <div class="swatch-label">${label}</div>`;
    grid.appendChild(div);
  });
}

function updateColor(key, value) {
  currentPalette[key] = value;
  const dot = document.getElementById('dot-' + key);
  if (dot) dot.style.background = value;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  saveState();
  scheduleRender();
}

function applyPreset(name, btn) {
  currentPalette = { ...PRESETS[name] };
  buildPaletteUI();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  saveState();
  scheduleRender();
}

// ════════════════════════════════════════════════
// FONT LOADING
// ════════════════════════════════════════════════
async function loadFont(input) {
  const file = input.files[0];
  if (!file) return;
  const buf = await file.arrayBuffer();
  customFontData = buf;
  customFontName = 'CustomFont';
  // Register for canvas use
  const blob = new Blob([buf], { type: 'font/ttf' });
  const url = URL.createObjectURL(blob);
  const ff = new FontFace(customFontName, `url(${url})`);
  await ff.load();
  document.fonts.add(ff);
  document.getElementById('font-status').style.display = 'block';
  document.getElementById('font-status').textContent = `✓ ${file.name} loaded`;
  saveState();
  scheduleRender();
}

// ════════════════════════════════════════════════
// TYPESCRIPT TOKENISER
// ════════════════════════════════════════════════
function tokenise(code) {
  const rules = [
    { type: 'comment-block', rx: /^\/\*[\s\S]*?\*\// },
    { type: 'comment',       rx: /^\/\/.*/ },
    { type: 'string',        rx: /^`(?:[^`\\]|\\.|\$\{[^}]*\})*`/ },
    { type: 'string',        rx: /^"(?:[^"\\]|\\.)*"/ },
    { type: 'string',        rx: /^'(?:[^'\\]|\\.)*'/ },
    { type: 'decorator',     rx: /^@[a-zA-Z_$][a-zA-Z0-9_$]*/ },
    { type: 'number',        rx: /^(?:0x[\da-fA-F]+|0o[0-7]+|0b[01]+|\d+(?:\.\d+)?(?:[eE][+-]?\d+)?n?)/ },
    { type: 'keyword',       rx: /^(?:abstract|as|async|await|break|case|catch|class|const|constructor|continue|debugger|declare|default|delete|do|else|enum|export|extends|finally|for|from|function|get|if|implements|import|in|instanceof|interface|keyof|let|module|namespace|new|of|override|package|private|protected|public|readonly|return|set|static|super|switch|throw|try|type|typeof|var|void|while|with|yield)\b/ },
    { type: 'builtin',       rx: /^(?:Array|Boolean|Date|Error|Function|Map|Math|Number|Object|Promise|Proxy|Reflect|RegExp|Set|String|Symbol|WeakMap|WeakSet|JSON|console|document|window|globalThis|undefined|null|true|false|NaN|Infinity)\b/ },
    { type: 'type-builtin',  rx: /^(?:any|boolean|never|null|number|object|string|symbol|undefined|unknown|void|bigint)\b/ },
    { type: 'interface',     rx: /^(?<=(?:interface|type|extends|implements|<|,|\s)\s*)[A-Z][a-zA-Z0-9_]*/ },
    { type: 'function',      rx: /^[a-zA-Z_$][a-zA-Z0-9_$]*(?=\s*(?:<[^>]*>)?\s*\()/ },
    { type: 'type-cap',      rx: /^[A-Z][a-zA-Z0-9_$]*/ },
    { type: 'identifier',    rx: /^[a-zA-Z_$][a-zA-Z0-9_$]*/ },
    { type: 'operator',      rx: /^(?:===|!==|=>|>=|<=|&&|\|\||[+\-*/%&|^~!<>=?:])/ },
    { type: 'punctuation',   rx: /^[{}[\]();,.]/ },
    { type: 'generic',       rx: /^<[^>]*>/ },
    { type: 'whitespace',    rx: /^[ \t]+/ },
    { type: 'newline',       rx: /^\n/ },
    { type: 'unknown',       rx: /^./ },
  ];

  const tokens = [];
  let i = 0;
  while (i < code.length) {
    let matched = false;
    for (const rule of rules) {
      const m = code.slice(i).match(rule.rx);
      if (m) {
        tokens.push({ type: rule.type, value: m[0] });
        i += m[0].length;
        matched = true;
        break;
      }
    }
    if (!matched) { tokens.push({ type: 'unknown', value: code[i] }); i++; }
  }
  return tokens;
}

function tokenTypeToColor(type, pal) {
  const map = {
    'comment': pal['tok-comment'],
    'comment-block': pal['tok-comment'],
    'string': pal['tok-string'],
    'number': pal['tok-number'],
    'keyword': pal['tok-keyword'],
    'decorator': pal['tok-decorator'],
    'function': pal['tok-function'],
    'type-builtin': pal['tok-type'],
    'type-cap': pal['tok-type'],
    'interface': pal['tok-interface'],
    'builtin': pal['tok-variable'],
    'operator': pal['tok-operator'],
    'punctuation': pal['tok-punctuation'],
    'generic': pal['tok-generic'],
    'identifier': pal['tok-fg'],
    'whitespace': null,
    'newline': null,
    'unknown': pal['tok-fg'],
  };
  return map[type] || pal['tok-fg'];
}

// ════════════════════════════════════════════════
// SVG BUILDER
// ════════════════════════════════════════════════
function buildSVG() {
  const code = document.getElementById('code-input').value;
  if (!code.trim()) return null;

  const pal = currentPalette;
  const fontSize = parseInt(document.getElementById('font-size-slider').value);
  const lineH = parseInt(document.getElementById('line-height-slider').value);
  const padH = parseInt(document.getElementById('pad-h-slider').value);
  const padV = parseInt(document.getElementById('pad-v-slider').value);
  const radius = parseInt(document.getElementById('radius-slider').value);
  const showLines = document.getElementById('show-lines').checked;
  const showChrome = document.getElementById('show-chrome').checked;
  const showShadow = document.getElementById('show-shadow').checked;
  const transparentBg = document.getElementById('transparent-bg').checked;
  const fontFam = customFontName || 'DM Mono';

  // Tokenise
  const tokens = tokenise(code);

  // Split into lines of token arrays
  const lines = [[]];
  for (const tok of tokens) {
    if (tok.type === 'newline') {
      lines.push([]);
    } else {
      lines[lines.length - 1].push(tok);
    }
  }

  // Measure text width using canvas
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `${fontSize}px "${fontFam}", "DM Mono", monospace`;

  function measureText(str) {
    return ctx.measureText(str).width;
  }

  // Compute max line width
  const lineNumWidth = showLines ? measureText(String(lines.length) + '  ') : 0;
  let maxLineWidth = 0;

  const lineData = lines.map((toks, i) => {
    let x = 0;
    const segments = toks.map(tok => {
      const w = measureText(tok.value);
      const seg = { tok, x, w };
      x += w;
      return seg;
    });
    if (x > maxLineWidth) maxLineWidth = x;
    return { segments, lineNum: i + 1 };
  });

  const chromeH = showChrome ? 36 : 0;
  const codeWidth = lineNumWidth + maxLineWidth;
  const totalWidth = codeWidth + padH * 2;
  const totalHeight = lines.length * lineH + padV * 2 + chromeH;

  // Shadow filter
  const shadowFilter = showShadow
    ? `<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
         <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
       </filter>`
    : '';
  const filterAttr = showShadow ? 'filter="url(#shadow)"' : '';

  // Embed font as base64 if custom
  let fontFaceDecl = '';
  if (customFontData) {
    const bytes = new Uint8Array(customFontData);
    let binary = '';
    for (let b of bytes) binary += String.fromCharCode(b);
    const b64 = btoa(binary);
    fontFaceDecl = `<defs>
      <style>
        @font-face {
          font-family: 'CustomFont';
          src: url('data:font/truetype;base64,${b64}');
        }
      </style>
    </defs>`;
  }

  // Build SVG
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${totalWidth}" height="${totalHeight}" viewBox="0 0 ${totalWidth} ${totalHeight}">
  <defs>
    ${showShadow && !transparentBg ? `<filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/>
    </filter>` : ''}
    ${customFontData ? (() => {
      const bytes = new Uint8Array(customFontData);
      let binary = '';
      for (let b of bytes) binary += String.fromCharCode(b);
      const b64 = btoa(binary);
      return `<style>@font-face{font-family:'CustomFont';src:url('data:font/truetype;base64,${b64}');}</style>`;
    })() : ''}
  </defs>

  ${transparentBg ? '' : `<!-- Card background -->
  <rect x="0" y="0" width="${totalWidth}" height="${totalHeight}"
    rx="${radius}" ry="${radius}"
    fill="${pal['tok-bg']}"
    ${showShadow ? 'filter="url(#shadow)"' : ''}/>
  `}
`;

  // Window chrome
  if (showChrome) {
    const chromeColor = adjustBrightness(pal['tok-bg'], 15);
    const r = radius;
    // Path that rounds only the top-left and top-right corners
    const chromePath = `M${r},0 H${totalWidth - r} Q${totalWidth},0 ${totalWidth},${r} V${chromeH} H0 V${r} Q0,0 ${r},0 Z`;
    svg += `  <!-- Chrome bar -->
  <path d="${chromePath}" fill="${chromeColor}"/>
  <!-- Traffic lights -->
  <circle cx="${padH}" cy="${chromeH/2}" r="6" fill="#ff5f56"/>
  <circle cx="${padH + 20}" cy="${chromeH/2}" r="6" fill="#ffbd2e"/>
  <circle cx="${padH + 40}" cy="${chromeH/2}" r="6" fill="#27c93f"/>
`;
  }

  // Measure true font ascent so line numbers & code tokens share the same baseline
  const metricsM = ctx.measureText('M');
  const ascent = metricsM.actualBoundingBoxAscent || fontSize * 0.72;
  // Baseline within each line row: top of row + half the leading slack + ascent
  const baselineOffset = Math.round((lineH - fontSize) / 2) + ascent;

  // Code lines
  const codeTop = chromeH + padV;

  lineData.forEach(({ segments, lineNum }, li) => {
    const y = codeTop + li * lineH + baselineOffset;

    // Line number
    if (showLines) {
      const lnStr = String(lineNum).padStart(String(lines.length).length, ' ');
      svg += `  <text x="${padH}" y="${y}" font-family="${fontFam},DM Mono,monospace" font-size="${fontSize}" fill="${pal['tok-linenum']}" xml:space="preserve">${escapeXML(lnStr)}</text>\n`;
    }

    const textLeft = padH + lineNumWidth;

    for (const { tok, x, w } of segments) {
      const color = tokenTypeToColor(tok.type, pal);
      if (tok.type === 'whitespace') continue;
      const italic = tok.type === 'comment' || tok.type === 'comment-block';
      svg += `  <text x="${textLeft + x}" y="${y}" font-family="${fontFam},DM Mono,monospace" font-size="${fontSize}" fill="${color}"${italic?' font-style="italic"':''} xml:space="preserve">${escapeXML(tok.value)}</text>\n`;
    }
  });

  svg += `</svg>`;
  return { svg, width: totalWidth, height: totalHeight, bgColor: pal['tok-bg'] };
}

function escapeXML(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function adjustBrightness(hex, amt) {
  // lighten or darken a hex color
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + amt));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amt));
  const b = Math.min(255, Math.max(0, (num & 0xff) + amt));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function renderCode() {
  const result = buildSVG();
  if (!result) return;
  const { svg, width, height } = result;
  lastSVG = { svg, width, height };

  const el = document.getElementById('svg-preview');
  el.style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';

  const transparentBg = document.getElementById('transparent-bg').checked;
  el.classList.toggle('transparent-bg', transparentBg);

  // Set SVG content
  el.setAttribute('viewBox', `0 0 ${width} ${height}`);
  el.setAttribute('width', Math.min(width, 900));
  el.setAttribute('height', Math.min(height, 900) * (Math.min(width,900)/width));
  el.innerHTML = new DOMParser().parseFromString(svg, 'image/svg+xml').documentElement.innerHTML;
  el.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  el.setAttribute('viewBox', `0 0 ${width} ${height}`);
  el.setAttribute('width', Math.min(width, 900));
  // Keep aspect ratio
  const scale = Math.min(900 / width, 800 / height, 1);
  el.setAttribute('width', Math.round(width * scale));
  el.setAttribute('height', Math.round(height * scale));

  document.getElementById('resolution-display').textContent = `${width} × ${height} px`;
}

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderCode, 250);
}

// ════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════
function downloadSVG() {
  const result = buildSVG();
  if (!result) { notify('Nothing to export — paste some code first.'); return; }
  const blob = new Blob([result.svg], { type: 'image/svg+xml' });
  triggerDownload(blob, 'code.svg');
  notify('SVG downloaded ✓');
}

async function downloadPNG() {
  const result = buildSVG();
  if (!result) { notify('Nothing to export — paste some code first.'); return; }
  const scale = parseFloat(document.getElementById('scale-slider').value);
  const { svg, width, height } = result;

  const img = new Image();
  const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = width * scale;
    canvas.height = height * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    // Only fill white if NOT transparent mode
    const transparentBg = document.getElementById('transparent-bg').checked;
    if (!transparentBg) {
      ctx.fillStyle = result.bgColor || '#000';
      ctx.fillRect(0, 0, width, height);
    }
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => {
      triggerDownload(b, 'code.png');
      notify(`PNG downloaded @ ${canvas.width}×${canvas.height}px ✓`);
    }, 'image/png');
  };
  img.onerror = () => notify('PNG export failed — try downloading SVG instead.');
  img.src = url;
}

function copyAsSVG() {
  const result = buildSVG();
  if (!result) { notify('Nothing to copy.'); return; }
  navigator.clipboard.writeText(result.svg).then(() => notify('SVG copied to clipboard ✓'));
}

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ════════════════════════════════════════════════
// NOTIFICATION
// ════════════════════════════════════════════════
let notifTimer;
function notify(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
loadState();        // restore persisted settings first
buildPaletteUI();   // build palette UI from (possibly restored) currentPalette

// Persist on every slider / toggle change
document.querySelectorAll('input[type=range], input[type=checkbox]').forEach(el => {
  el.addEventListener('change', saveState);
});

// Persist code on input (debounced via scheduleRender which already fires)
document.getElementById('code-input').addEventListener('input', () => {
  saveState();
  scheduleRender();
});

window.addEventListener('load', () => setTimeout(renderCode, 400));
</script>
