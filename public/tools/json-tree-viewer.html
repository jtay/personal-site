<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Tree Viewer</title>
<link rel="stylesheet" href="shared.css">
<!-- JSON Formatter Library -->
<script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.3.4/dist/json-formatter.umd.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }
  .split-container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }
  .pane {
    position: relative;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: var(--surface);
  }
  .pane-left { width: 40%; }
  .pane-right { flex: 1; background: var(--surface2); overflow-y: auto; padding: 16px; }
  .divider {
    width: 6px; background: var(--border); cursor: col-resize;
    position: relative; z-index: 10; flex-shrink: 0; transition: background 0.15s; user-select: none;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }
  .pane-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid var(--border); background: inherit; flex-shrink: 0;
  }
  .pane-content { flex: 1; position: relative; min-height: 0; }
  textarea {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; border-radius: 0; resize: none; padding: 16px 16px 40px 16px; /* extra bottom padding */
    background: transparent; font-family: 'DM Mono', monospace; color: var(--text);
    outline: none; line-height: 1.6; transition: box-shadow 0.15s ease;
  }
  textarea.error { box-shadow: inset 0 0 0 2px var(--warn); }
  
  /* JSON Formatter Dark Theme Styles tweaks */
  .json-formatter-dark { background: transparent !important; font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.5; }
  .json-formatter-dark .json-formatter-row, 
  .json-formatter-dark .json-formatter-row a, 
  .json-formatter-dark .json-formatter-row a:hover { color: var(--text); }
  .json-formatter-dark .json-formatter-string { color: #10b981; }
  .json-formatter-dark .json-formatter-number { color: #3b82f6; }
  .json-formatter-dark .json-formatter-boolean { color: #f59e0b; }
  .json-formatter-dark .json-formatter-null { color: var(--muted); }
  .json-formatter-dark .json-formatter-key { color: #c084fc; font-weight: 500; }
  
  @media (max-width: 768px) {
    .split-container { flex-direction: column; }
    .pane-left { width: 100% !important; height: 40%; }
    .divider { width: 100%; height: 6px; cursor: row-resize; }
  }
  
  #tree-container {
      width: 100%;
      height: 100%;
  }
  .empty-state {
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      font-size: 13px;
  }
</style>
</head>
<body>

<div class="split-container">
  <div class="pane pane-left" id="pane-left">
    <div class="pane-header">
      <div style="font-weight: 700; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);">JSON Source</div>
      <div class="row-flex" style="gap: 8px;">
        <button id="format-btn" class="btn btn-secondary" style="padding: 4px 12px; font-size: 11px;">Format</button>
        <button id="copy-btn" class="btn btn-secondary" style="padding: 4px 12px; font-size: 11px;">Copy</button>
      </div>
    </div>
    <div class="pane-content">
      <textarea id="json-input" placeholder="Paste your JSON here to view the tree..."></textarea>
    </div>
  </div>
  
  <div class="divider" id="divider"></div>

  <div class="pane pane-right" id="pane-right">
    <div id="tree-container">
        <div class="empty-state">Tree view will appear here when valid JSON is entered.</div>
    </div>
  </div>
</div>

<script>
  // Split pane logic
  const divider = document.getElementById('divider');
  const paneLeft = document.getElementById('pane-left');
  let isDragging = false;
  let isVertical = window.innerWidth <= 768;

  window.addEventListener('resize', () => {
    isVertical = window.innerWidth <= 768;
    if (isVertical) { paneLeft.style.width = '100%'; } 
    else { paneLeft.style.height = '100%'; }
  });

  function startDrag() {
    isDragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = isVertical ? 'row-resize' : 'col-resize';
  }

  function doDrag(clientX, clientY) {
    if (!isDragging) return;
    if (isVertical) {
      const percentage = (clientY / window.innerHeight) * 100;
      paneLeft.style.height = Math.min(Math.max(percentage, 10), 90) + '%';
    } else {
      const percentage = (clientX / window.innerWidth) * 100;
      paneLeft.style.width = Math.min(Math.max(percentage, 10), 90) + '%';
    }
  }

  function endDrag() {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
    }
  }

  divider.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
  document.addEventListener('mouseup', endDrag);

  divider.addEventListener('touchstart', startDrag);
  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    doDrag(e.touches[0].clientX, e.touches[0].clientY);
  });
  document.addEventListener('touchend', endDrag);


  // JSON Viewer Logic
  const jsonInput = document.getElementById('json-input');
  const treeContainer = document.getElementById('tree-container');
  const formatBtn = document.getElementById('format-btn');

  function renderTree(parsedData) {
    treeContainer.innerHTML = '';
    // Use JSONFormatter library exposing JSONFormatter globally window
    const formatter = new JSONFormatter(parsedData, 2, {
        hoverPreviewEnabled: false,
        theme: 'dark'
    });
    treeContainer.appendChild(formatter.render());
  }

  jsonInput.addEventListener('input', () => {
    const val = jsonInput.value.trim();
    if (!val) {
      jsonInput.classList.remove('error');
      treeContainer.innerHTML = '<div class="empty-state">Tree view will appear here when valid JSON is entered.</div>';
      return;
    }
    
    try {
      const parsed = JSON.parse(val);
      jsonInput.classList.remove('error');
      renderTree(parsed);
    } catch (e) {
      jsonInput.classList.add('error');
    }
  });

  formatBtn.addEventListener('click', () => {
    try {
      const parsed = JSON.parse(jsonInput.value);
      jsonInput.value = JSON.stringify(parsed, null, 2);
      jsonInput.classList.remove('error');
    } catch(e) {}
  });

  const copyBtn = document.getElementById('copy-btn');
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(jsonInput.value);
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('btn-success');
      copyBtn.classList.remove('btn-secondary');
      setTimeout(() => {
        copyBtn.textContent = orig;
        copyBtn.classList.remove('btn-success');
        copyBtn.classList.add('btn-secondary');
      }, 1500);
    } catch (e) {}
  });

</script>
</body>
</html>
