<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Upscaler</title>
<link rel="stylesheet" href="shared.css">
<style>
  #dropzone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    background: var(--surface);
    transition: all 0.15s ease;
  }
  #dropzone:hover, #dropzone.over {
    border-color: var(--accent);
    background: rgba(59, 130, 246, 0.05);
    color: var(--text);
  }
  .rm {
    font-size: 18px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color .15s;
    padding: 4px;
  }
  .rm:hover { color: #f87171; }
  .name-group { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dims { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="tool-container" style="max-width: 800px;">
  <h1>Pixel Art Upscaler</h1>

  <div class="tool-card" style="margin-bottom: 24px; padding: 0; overflow: hidden;">
    <div id="dropzone" class="tool-section">
      <p><strong>Drop PNGs here</strong> or click to browse</p>
      <div style="margin-top: 16px;">
        <button class="btn btn-secondary" onclick="event.stopPropagation(); loadExample()">Use Example Asset</button>
      </div>
      <input type="file" id="file-input" accept="image/png" multiple style="display: none;">
    </div>

    <div id="toolbar" class="tool-section" style="display:none; border-bottom: none; background: var(--surface2);">
      <div class="form-row" style="margin-bottom: 0;">
        <div class="row-flex">
          <label class="label-caps">Global Multiplier</label>
          <select id="global-mult">
            <option value="2">x2</option>
            <option value="3">x3</option>
            <option value="4" selected>x4</option>
            <option value="6">x6</option>
            <option value="8">x8</option>
            <option value="10">x10</option>
            <option value="16">x16</option>
          </select>
          <button id="apply-all" class="btn btn-secondary">Apply to All</button>
        </div>
        <button id="save-all" class="btn btn-primary">Save All Assets</button>
      </div>
    </div>
  </div>

  <div id="images" style="display: flex; flex-direction: column; gap: 12px;"></div>
</div>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const imageList = document.getElementById('images');
  const toolbar = document.getElementById('toolbar');
  const globalMult = document.getElementById('global-mult');
  const rows = []; // { sel, img, file }

  async function loadExample() {
    try {
      const res = await fetch('/assets/tools/pixel-art.png');
      const blob = await res.blob();
      const file = new File([blob], 'pixel-art.png', { type: 'image/png' });
      addImage(file);
    } catch (e) {
      console.error('Failed to load example', e);
    }
  }

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('over'); handleFiles(e.dataTransfer.files); });

  document.getElementById('apply-all').addEventListener('click', () => {
    rows.forEach(r => { r.sel.value = globalMult.value; r.updateDims(); });
  });

  document.getElementById('save-all').addEventListener('click', async () => {
    for (const r of rows) {
      await saveImage(r.img, r.file, +r.sel.value);
      await new Promise(res => setTimeout(res, 80));
    }
  });

  function handleFiles(files) {
    [...files].filter(f => f.type === 'image/png').forEach(addImage);
  }

  function addImage(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const row = document.createElement('div');
        row.className = 'tool-list-row';

        const thumb = document.createElement('img');
        thumb.className = 'tool-list-row-thumb pixelated';
        thumb.src = e.target.result;
        // pixel checkerboard pattern for alpha
        thumb.style.background = 'repeating-conic-gradient(#1e1e28 0% 25%, #2a2a38 0% 50%) 0 0 / 12px 12px';

        const nameGroup = document.createElement('div');
        nameGroup.className = 'name-group';

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = file.name;

        const dims = document.createElement('span');
        dims.className = 'dims';

        nameGroup.append(name, dims);

        const sel = document.createElement('select');
        [2,3,4,6,8,10,16].forEach(n => {
          const opt = document.createElement('option');
          opt.value = n; opt.textContent = 'x' + n;
          if (n === +globalMult.value) opt.selected = true;
          sel.appendChild(opt);
        });

        const updateDims = () => {
          const m = +sel.value;
          dims.textContent = `${img.width}x${img.height} → ${img.width*m}x${img.height*m}`;
        };
        updateDims();
        sel.addEventListener('change', updateDims);

        const dl = document.createElement('button');
        dl.className = 'btn btn-success';
        dl.textContent = 'Save';
        dl.addEventListener('click', () => saveImage(img, file, +sel.value));

        const rm = document.createElement('button');
        rm.className = 'rm';
        rm.textContent = '×';
        rm.addEventListener('click', () => {
          row.remove();
          const i = rows.findIndex(r => r.sel === sel);
          if (i !== -1) rows.splice(i, 1);
          if (rows.length === 0) toolbar.style.display = 'none';
        });

        row.append(thumb, nameGroup, sel, dl, rm);
        imageList.appendChild(row);
        rows.push({ sel, img, file, updateDims });
        toolbar.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function saveImage(img, file, mult) {
    return new Promise(res => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width * mult;
      canvas.height = img.height * mult;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name.replace(/\.png$/i, '') + '_x' + mult + '.png';
        a.click();
        URL.revokeObjectURL(a.href);
        res();
      }, 'image/png');
    });
  }
</script>
</body>
</html>
